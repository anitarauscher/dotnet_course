name: Test Automation Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run UI tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore --configuration Release
      
      - name: Run API Tests
        run: dotnet test --no-build --configuration Release --filter "Category=API" --logger "trx;LogFileName=api-test-results.trx"
        continue-on-error: true
      
      - name: Upload API Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: api-test-results
          path: '**/TestResults/api-test-results.trx'

  ui-tests:
    name: Run UI Tests
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()  # Run even if API tests fail
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore --configuration Release
      
      - name: Run UI Tests
        run: dotnet test --no-build --configuration Release --filter "Category=UI" --logger "trx;LogFileName=ui-test-results.trx"
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
        continue-on-error: true
      
      - name: Upload UI Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ui-test-results
          path: '**/TestResults/ui-test-results.trx'
      
      - name: Upload Screenshots
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: screenshots
          path: '**/Screenshots/**'